<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coachingtest – Livskvalitet</title>

  <style>
    :root{
      --bg:#f7f7f8;
      --card:#ffffff;
      --ink:#111;
      --muted:#6b7280;
      --line:#e5e7eb;
      --green:#16a34a;
      --green-dark:#15803d;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;
      background:var(--bg);
      color:var(--ink);
    }

    .wrap{
      max-width:900px;
      margin:0 auto;
      padding:24px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      box-shadow:0 6px 24px rgba(0,0,0,.06);
      padding:24px;
    }

    h1{
      font-size:clamp(22px,3vw,30px);
      margin:0 0 12px;
      font-weight:800;
    }

    h2{
      font-size:20px;
      margin:0;
    }

    p{
      margin:0;
      line-height:1.6;
    }

    ul{
      margin:0;
      padding-left:22px;
      line-height:1.7;
    }

    .muted{
      color:var(--muted);
    }

    .row{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
    }

    .btn{
      appearance:none;
      border:1px solid var(--ink);
      background:var(--ink);
      color:#fff;
      padding:10px 16px;
      border-radius:12px;
      cursor:pointer;
      font-weight:600;
      text-decoration:none;
      display:inline-block;
    }

    .btn.sec{
      background:#fff;
      color:var(--ink);
    }

    .btn:disabled{
      opacity:.4;
      cursor:not-allowed;
    }

    .pill{
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 14px;
      cursor:pointer;
      user-select:none;
      background:#fff;
      transition:.15s;
    }

    .pill:hover{
      background:#f3f4f6;
    }

    .pill.sel{
      outline:2px solid var(--ink);
      font-weight:800;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .prog{
      height:10px;
      background:#e5e7eb;
      border-radius:999px;
      overflow:hidden;
    }

    .prog>div{
      height:100%;
      background:#000;
      width:0;
    }

    .qarea{
      font-size:14px;
      color:var(--muted);
      margin-bottom:6px;
    }

    .qtext{
      font-size:18px;
      font-weight:600;
      margin-bottom:12px;
    }

    .actions{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-top:16px;
    }

    .stack{
      display:grid;
      gap:12px;
    }

    .grid{
      display:grid;
      gap:16px;
    }

    @media(min-width:720px){
      .grid{
        grid-template-columns:1fr 1fr;
      }
    }

    .footnote{
      font-size:12px;
      color:var(--muted);
      margin-top:12px;
    }

    .hr{
      height:1px;
      background:var(--line);
      margin:16px 0;
    }

    .infoBox{
      background:#f9fafb;
      border:1px solid var(--line);
      border-radius:14px;
      padding:16px;
    }

    .scoreWrap{
      display:grid;
      gap:10px;
      align-items:center;
    }

    .gbar{
      position:relative;
      height:18px;
      border-radius:999px;
      background:#e5e7eb;
      overflow:hidden;
    }

    .gfill{
      height:100%;
      width:0;
      background:var(--green);
    }

    .bar{
      height:16px;
      background:#e5e7eb;
      border-radius:999px;
      overflow:hidden;
    }

    .bar>div{
      height:100%;
      width:0;
      background:var(--green);
    }

    .cta{
      display:inline-block;
      text-decoration:none;
      color:#fff;
      background:var(--green);
      font-weight:800;
      padding:16px 20px;
      border-radius:20px;
      border:1px solid var(--green);
      box-shadow:0 2px 10px rgba(0,0,0,.15);
      transition:transform .05s ease, box-shadow .2s ease, background .2s ease;
      font-size:16px;
      cursor:pointer;
      text-align:center;
    }

    .cta:hover{
      transform:translateY(-1px);
      box-shadow:0 6px 16px rgba(0,0,0,.22);
      background:var(--green-dark);
    }

    .btnRow{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .swishBox{
      text-align:center;
      padding:20px;
      border:2px dashed #d1d5db;
      border-radius:16px;
      background:#fff;
    }

    .swishNumber{
      font-size:24px;
      font-weight:900;
      color:var(--green);
    }

    .price{
      font-size:34px;
      font-weight:900;
      color:var(--green);
    }
  </style>
</head>

<body>

<div class="wrap">
  <div class="card" id="app"></div>
</div>

<script>

const QUESTIONS = [
  { id:1, area:"Ekonomi", text:"Jag har en tydlig överblick över mina inkomster och utgifter.", type:"scale" },
  { id:2, area:"Ekonomi", text:"Jag har en buffert/sparande som gör att jag känner mig trygg.", type:"scale" },
  { id:3, area:"Ekonomi", text:"Jag oroar mig ofta för pengar.", type:"yn", reverse:true },
  { id:4, area:"Ekonomi", text:"Jag upplever att min ekonomiska situation är stabil.", type:"scale" },
  { id:5, area:"Ekonomi", text:"Jag kan betala mina räkningar i tid varje månad.", type:"yn" },

  { id:6, area:"Fysisk hälsa", text:"Jag äter en balanserad och näringsrik kost.", type:"scale" },
  { id:7, area:"Fysisk hälsa", text:"Jag tränar regelbundet.", type:"yn" },
  { id:8, area:"Fysisk hälsa", text:"Jag känner mig pigg och energifylld.", type:"scale" },
  { id:9, area:"Fysisk hälsa", text:"Jag får tillräckligt med sömn.", type:"scale" },
  { id:10, area:"Fysisk hälsa", text:"Jag hanterar stress på ett hälsosamt sätt.", type:"scale" },

  { id:11, area:"Relationer", text:"Jag har personer i mitt liv som jag kan lita på.", type:"scale" },
  { id:12, area:"Relationer", text:"Jag känner mig uppskattad av människor runt mig.", type:"scale" },
  { id:13, area:"Relationer", text:"Jag känner mig ofta ensam.", type:"yn", reverse:true },
  { id:14, area:"Relationer", text:"Jag är nöjd med kvaliteten på mina relationer.", type:"scale" },

  { id:15, area:"Sysselsättning", text:"Jag är nöjd med mitt arbete eller min sysselsättning.", type:"scale" },
  { id:16, area:"Sysselsättning", text:"Jag känner att mitt arbete känns meningsfullt.", type:"scale" },
  { id:17, area:"Sysselsättning", text:"Jag upplever balans mellan arbete och fritid.", type:"scale" },
  { id:18, area:"Sysselsättning", text:"Jag känner mig stressad av arbete eller studier.", type:"yn", reverse:true }
];

const AREAS = [
  "Ekonomi",
  "Fysisk hälsa",
  "Relationer",
  "Sysselsättning"
];

const LINKS = {
  "Sysselsättning": "https://kalleandersson872-design.github.io/sysselsattning/",
  "Ekonomi": "https://kalleandersson872-design.github.io/ekonomi1/",
  "Relationer": "https://kalleandersson872-design.github.io/relationer/",
  "Fysisk hälsa": "https://kalleandersson872-design.github.io/fysisk-halsa-test/"
};

let started = false;
let idx = 0;

const answers = {};
const app = document.getElementById('app');

function mapAnswerToScore(q, value){

  if(q.type === 'scale'){
    const v = Number(value);
    return v >= 1 && v <= 5 ? v : 0;
  }

  if(q.type === 'yn'){
    const yes = q.reverse ? 1 : 5;
    const no = q.reverse ? 5 : 1;

    return value === 'Ja' ? yes :
           value === 'Nej' ? no : 0;
  }

  return 0;
}

function summary(){

  const sums = Object.fromEntries(
    AREAS.map(a => [a,0])
  );

  QUESTIONS.forEach(q => {
    sums[q.area] += mapAnswerToScore(q, answers[q.id]);
  });

  const scores = Object.fromEntries(
    AREAS.map(a => [
      a,
      Math.round((sums[a] / (QUESTIONS.filter(q => q.area === a).length * 5)) * 100)
    ])
  );

  return { sums, scores };
}

function progress(){
  return Math.round(((idx + 1) / QUESTIONS.length) * 100);
}

function goNext(){

  const q = QUESTIONS[idx];

  if(q && answers[q.id] !== undefined){
    idx++;
    render();
  }
}

function goBack(){

  if(idx > 0){
    idx--;
    render();
  }
}

function render(){

  if(!started){

    app.innerHTML = `
      <h1>Coachingtest – Livskvalitet</h1>

      <div class="stack">

        <p class="muted">
          Testet ger en överblick över din upplevda livskvalitet inom:
          ekonomi, fysisk hälsa, relationer och sysselsättning.
        </p>

        <div class="infoBox stack">

          <h2>Så fungerar testet</h2>

          <p class="muted">
            Testet består av frågor där du svarar med 1–5 eller Ja/Nej.
            När testet är klart visas ditt resultat som staplar.
          </p>

        </div>

        <div class="infoBox stack">

          <h2>Efter genomfört test kan du</h2>

          <ul class="muted">
            <li>se ditt resultat,</li>
            <li>skriva ut eller spara resultatet som PDF,</li>
            <li>göra om testet,</li>
            <li>köpa ett fördjupande test för 19 kr via Swish.</li>
          </ul>

        </div>

        <div class="infoBox stack">

          <h2>Anonymitet och GDPR</h2>

          <p class="muted">
            Testet är anonymt och gratis.
            Inga personuppgifter sparas eller delas.
            Testet är utformat för att följa svensk lagstiftning
            samt EU:s dataskyddsförordning (GDPR).
          </p>

        </div>

        <p class="muted">
          Genom att starta testet bekräftar du att du tagit del av informationen ovan.
        </p>

        <button class="btn" id="startBtn">
          Starta testet
        </button>

      </div>
    `;

    document.getElementById('startBtn').onclick = () => {
      started = true;
      render();
    };

    return;
  }

  if(idx >= QUESTIONS.length){

    const {scores} = summary();

    const sorted = Object.entries(scores).sort((a,b)=>a[1]-b[1]);

    const lowestArea = sorted[0][0];
    const lowestVal = sorted[0][1];

    app.innerHTML = `

      <h1>Ditt resultat</h1>

      <div class="grid">

        ${AREAS.map(a => `

          <div class="stack">

            <div style="display:flex;justify-content:space-between">

              <strong>${a}</strong>
              <span>${scores[a]}%</span>

            </div>

            <div class="bar">
              <div style="width:${scores[a]}%"></div>
            </div>

          </div>

        `).join('')}

      </div>

      <div class="hr"></div>

      <div class="stack">

        <div class="infoBox stack">

          <h2>Fördjupande test</h2>

          <p class="muted">
            Ditt lägsta område är:
            <strong>${lowestArea}</strong>
            (${lowestVal}%)
          </p>

          <div class="swishBox stack">

            <div class="price">19 kr</div>

            <p class="muted">
              Köp det fördjupande testet via Swish
            </p>

            <div class="swishNumber">
              0763044124
            </div>

            <p class="muted">
              Skriv:
              <strong>${lowestArea}</strong>
              i Swish-meddelandet.
            </p>

            <button
              class="cta"
              onclick="window.location.href='swish://paymentrequest?amount=19&message=${encodeURIComponent(lowestArea)}'"
            >
              Betala med Swish
            </button>

          </div>

        </div>

      </div>

      <div class="hr"></div>

      <div class="btnRow">

        <button class="btn sec" onclick="window.print()">
          Skriv ut / PDF
        </button>

        <button class="btn" onclick="location.reload()">
          Gör om testet
        </button>

      </div>
    `;

    return;
  }

  const q = QUESTIONS[idx];
  const val = answers[q.id];
  const pct = progress();

  app.innerHTML = `

    <div class="topbar">

      <h1>Coachingtest – Livskvalitet</h1>

      <div class="muted">
        Fråga ${idx + 1} av ${QUESTIONS.length}
        · ${pct}%
      </div>

    </div>

    <div class="prog">
      <div style="width:${pct}%"></div>
    </div>

    <div class="stack" style="margin-top:16px">

      <div class="qarea">${q.area}</div>

      <div class="qtext">${q.text}</div>

      <div class="row" id="opts"></div>

    </div>

    <div class="actions">

      <button
        class="btn sec"
        ${idx === 0 ? 'disabled' : ''}
        id="backBtn"
      >
        Tillbaka
      </button>

      <button
        class="btn"
        ${val ? '' : 'disabled'}
        id="nextBtn"
      >
        ${idx < QUESTIONS.length - 1 ? 'Nästa' : 'Visa resultat'}
      </button>

    </div>

    <div class="footnote">
      Använd siffrorna 1–5, Enter och piltangenterna.
    </div>
  `;

  const opts = document.getElementById('opts');

  if(q.type === 'yn'){

    ['Ja','Nej'].forEach(opt => {

      const el = document.createElement('div');

      el.className = 'pill' + (val === opt ? ' sel' : '');

      el.textContent = opt;

      el.onclick = () => {
        answers[q.id] = opt;
        render();
      };

      opts.appendChild(el);

    });

  } else {

    [1,2,3,4,5].forEach(n => {

      const el = document.createElement('div');

      el.className = 'pill' + (val === n ? ' sel' : '');

      el.textContent = n;

      el.onclick = () => {
        answers[q.id] = n;
        render();
      };

      opts.appendChild(el);

    });
  }

  document.getElementById('backBtn').onclick = goBack;
  document.getElementById('nextBtn').onclick = goNext;
}

document.addEventListener('keydown', function(e){

  if(!started || idx >= QUESTIONS.length){
    return;
  }

  const q = QUESTIONS[idx];

  if(!q){
    return;
  }

  if(q.type === 'scale' && ['1','2','3','4','5'].includes(e.key)){

    answers[q.id] = Number(e.key);
    render();
    return;
  }

  if(q.type === 'yn'){

    if(e.key === '1' || e.key === 'ArrowLeft'){

      answers[q.id] = 'Ja';
      render();
      return;
    }

    if(e.key === '2' || e.key === 'ArrowRight'){

      answers[q.id] = 'Nej';
      render();
      return;
    }
  }

  if(e.key === 'Enter'){
    goNext();
    return;
  }

  if(e.key === 'ArrowUp'){
    goBack();
    return;
  }

  if(e.key === 'ArrowDown'){
    goNext();
  }
});

render();

</script>

</body>
</html>
